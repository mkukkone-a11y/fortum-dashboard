<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard: UMM RSS & Kello</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            box-sizing: border-box;
            overflow: hidden; 
        }
        
        .dashboard-wrapper {
            display: flex;
            flex-direction: row; 
            gap: 40px;
            width: 95vw;
            max-width: 1800px; 
            height: 85vh; 
        }

        .clock-container, .umm-container {
            flex: 1; 
            background: #1e1e1e;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 40px 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* --- UMM TYYLIT --- */
        .umm-header-container {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
            flex-shrink: 0; 
        }

        .umm-header {
            font-size: 1.6rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-weight: bold;
        }

        .umm-last-updated {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .error-banner {
            background-color: #4a1515;
            color: #ff8080;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-align: center;
            display: none; /* Piilotettu oletuksena */
            border: 1px solid #ff4d4d;
        }

        #umm-content {
            flex: 1;
            overflow-y: auto; 
            padding-right: 15px;
        }

        #umm-content::-webkit-scrollbar { width: 8px; }
        #umm-content::-webkit-scrollbar-track { background: #1e1e1e; }
        #umm-content::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .umm-card {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .umm-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 12px;
            color: #e0e0e0;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .umm-remarks {
            font-size: 14px;
            color: #cccccc;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-left: 3px solid #005293;
            border-radius: 4px;
            margin-bottom: 12px;
            font-style: italic;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .umm-time {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .timer {
            font-weight: bold;
            font-size: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }

        .timer.upcoming { background: #0f2942; color: #66b3ff; }
        .timer.warning { background: #4a1515; color: #ff8080; }
        .timer.active { background: #113311; color: #80ff80; }
        .timer.active-warning { background: #4d2600; color: #ffb366; }
        .timer.finished { background: #333333; color: #888888; }

        /* --- KELLON TYYLIT --- */
        .clock-container {
            justify-content: center; 
            align-items: center;
            gap: 40px;
        }

        .week-display {
            font-size: 1.8rem;
            color: #4CAF50;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            width: 100%;
            text-align: center;
            margin-bottom: -10px;
        }
        
        .country-block {
            text-align: center;
            width: 100%;
        }
        
        .country-name {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        .flag-icon {
            height: 26px;
            border-radius: 3px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        
        .time-display {
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            margin-bottom: 5px;
            line-height: 1;
        }

        .date-display {
            color: #aaaaaa;
            text-transform: capitalize;
        }
        
        .finland .country-name { font-size: 1.5rem; }
        .finland .flag-icon { height: 32px; }
        .finland .time-display { 
            font-size: 9rem; 
            color: #00A6EF; 
            text-shadow: 0 0 30px rgba(0, 166, 239, 0.4); 
        }
        .finland .date-display { font-size: 1.6rem; }

        .sweden { opacity: 0.85; }
        .sweden .country-name { font-size: 1.2rem; }
        .sweden .time-display { 
            font-size: 5rem; 
            color: #FFD700; 
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); 
        }
        .sweden .date-display { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    
    <div class="umm-container">
        <div class="umm-header-container">
            <h2 class="umm-header">UMMIT AKTIIVISET/TULEVAT</h2>
            <div id="last-updated" class="umm-last-updated">Ladataan tietoja...</div>
        </div>
        <div id="error-banner" class="error-banner">⚠️ Yhteyshäiriö Nord Pooliin - näytetään aiemmin haetut tiedot</div>
        <div id="umm-content">Ladataan RSS-syötettä...</div>
    </div>

    <div class="clock-container">
        <div class="week-display" id="week-number">VIIKKO --</div>
        
        <div class="country-block finland">
            <div class="country-name">
                <svg class="flag-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 11">
                    <rect width="18" height="11" fill="#ffffff"/>
                    <rect width="5" height="11" x="5" fill="#002f6c"/>
                    <rect width="18" height="3" y="4" fill="#002f6c"/>
                </svg>
                SUOMI
            </div>
            <div class="time-display" id="time-fi">--:--:--</div>
            <div class="date-display" id="date-fi">--</div>
        </div>
        
        <div class="country-block sweden">
            <div class="country-name">
                <svg class="flag-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 10">
                    <rect width="16" height="10" fill="#005293"/>
                    <rect width="2" height="10" x="5" fill="#fecb00"/>
                    <rect width="16" height="2" y="4" fill="#fecb00"/>
                </svg>
                RUOTSI
            </div>
            <div class="time-display" id="time-se">--:--:--</div>
            <div class="date-display" id="date-se">--</div>
        </div>
    </div>

</div>

<script>
    /* --- KELLON LOGIIKKA --- */
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function capitalizeFirstLetter(string) {
        return string.charAt(0).toUpperCase() + string.slice(1);
    }

    function updateClocks() {
        const now = new Date();
        document.getElementById('week-number').textContent = 'VIIKKO ' + getWeekNumber(now);

        const tOpt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const dOpt = { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' };

        document.getElementById('time-fi').textContent = new Intl.DateTimeFormat('fi-FI', { ...tOpt, timeZone: 'Europe/Helsinki' }).format(now).replace(/\./g, ':');
        document.getElementById('date-fi').textContent = capitalizeFirstLetter(new Intl.DateTimeFormat('fi-FI', { ...dOpt, timeZone: 'Europe/Helsinki' }).format(now));
        
        document.getElementById('time-se').textContent = new Intl.DateTimeFormat('fi-FI', { ...tOpt, timeZone: 'Europe/Stockholm' }).format(now).replace(/\./g, ':');
        document.getElementById('date-se').textContent = capitalizeFirstLetter(new Intl.DateTimeFormat('fi-FI', { ...dOpt, timeZone: 'Europe/Stockholm' }).format(now));
    }
    updateClocks();
    setInterval(updateClocks, 1000);


    /* --- UMM RSS-LUKIJAN LOGIIKKA --- */
    var ummContent = document.getElementById('umm-content');
    var errorBanner = document.getElementById('error-banner');
    var lastUpdatedEl = document.getElementById('last-updated');
    
    var countdownIntervals = [];
    var cachedEvents = []; // Välimuisti (Fallback)
    var isFirstLoad = true;

    function parseNordPoolDate(str) {
        if (!str) return null;
        var parts = str.trim().split(/[\s.]+/);
        if (parts.length >= 4) {
            var d = parseInt(parts[0], 10);
            var m = parseInt(parts[1], 10) - 1;
            var y = parseInt(parts[2], 10);
            var time = parts[3].split(':');
            var hr = parseInt(time[0], 10);
            var min = parseInt(time[1], 10);
            
            // Nord Poolin aika (CET/CEST) -> Suomen aika (EET/EEST) vaatii aina tasan +1h lisäyksen
            return new Date(y, m, d, hr + 1, min, 0);
        }
        return null;
    }

    // Piirtää tapahtumat ruudulle joko tuoreesta tai vanhasta datasta
    function renderEvents(eventsToRender, isError) {
        countdownIntervals.forEach(clearInterval);
        countdownIntervals = [];
        ummContent.innerHTML = '';
        
        if (isError) {
            errorBanner.style.display = 'block';
        } else {
            errorBanner.style.display = 'none';
        }

        if (eventsToRender.length === 0) {
            ummContent.innerHTML = '<div style="text-align:center; color:#888; font-size:1.2rem; padding: 20px;">Ei tulevia tai aktiivisia tapahtumia seuraavaan 7 päivään.</div>';
            return;
        }

        eventsToRender.forEach((ev) => {
            var card = document.createElement('div');
            card.className = 'umm-card';
            
            var title = document.createElement('div');
            title.className = 'umm-title';
            title.innerText = ev.title;
            card.appendChild(title);
            
            if (ev.remarks && ev.remarks.trim().length > 0) {
                var remarksDiv = document.createElement('div');
                remarksDiv.className = 'umm-remarks';
                remarksDiv.innerText = ev.remarks;
                card.appendChild(remarksDiv);
            }
            
            var p = document.createElement('div');
            p.className = 'umm-time';
            p.innerHTML = 'Alkaa: ' + ev.start.toLocaleString('fi-FI') + (ev.end ? '<br>Päättyy: ' + ev.end.toLocaleString('fi-FI') : '');
            card.appendChild(p);
            
            var tmr = document.createElement('div');
            tmr.className = 'timer';
            card.appendChild(tmr);
            
            ummContent.appendChild(card);
            
            var intervalId = setInterval(() => {
                var nw = new Date();
                var ds = ev.start - nw;
                var de = ev.end ? ev.end - nw : -1;
                
                var ft = ms => {
                    if (ms < 0) return '00:00:00';
                    var ts = Math.floor(ms / 1000), da = Math.floor(ts / 86400), h = Math.floor((ts % 86400) / 3600), m = Math.floor((ts % 3600) / 60), se = ts % 60;
                    return (da > 0 ? da + 'p ' + h + 'h ' : h + 'h ') + m + 'm ' + se + 's';
                };
                
                var h2 = 7200000; 
                
                if (ds > 0) {
                    if (ds <= h2) { tmr.innerText = '⚠️ Alkaa: ' + ft(ds); tmr.className = 'timer warning'; }
                    else { tmr.innerText = 'Alkaa: ' + ft(ds); tmr.className = 'timer upcoming'; }
                } else if (ds <= 0 && de > 0) {
                    if (de <= h2) { tmr.innerText = '⚠️ AKTIIVINEN. Päättyy: ' + ft(de); tmr.className = 'timer active-warning'; }
                    else { tmr.innerText = 'AKTIIVINEN. Päättyy: ' + ft(de); tmr.className = 'timer active'; }
                } else {
                    tmr.innerText = 'Tapahtuma päättynyt'; tmr.className = 'timer finished';
                }
            }, 1000);

            countdownIntervals.push(intervalId);
        });
    }

    function fetchUMMRSS() {
        // AbortController asettaa 10 sekunnin aikakatkaisun (Timeout)
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        // Dynaaminen URL - poistettu kovakoodatut päivämäärät!
        var now = new Date();
        var startDate = new Date(now); startDate.setDate(startDate.getDate() - 7); // viikko taaksepäin
        var stopDate = new Date(now); stopDate.setDate(stopDate.getDate() + 14); // 2 viikkoa eteenpäin
        
        var dynamicUrl = `https://ummrss.nordpoolgroup.com/messages/?messageTypes=5&areas=10YFI-1--------U&companies=N00290&searchText=river&publicationStartDate=2020-01-01T00:00:00.000Z&eventStartDate=${startDate.toISOString()}&eventStopDate=${stopDate.toISOString()}&limit=100`;

        const proxyUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(dynamicUrl);

        fetch(proxyUrl, { signal: controller.signal })
            .then(r => r.json())
            .then(data => {
                clearTimeout(timeoutId); // Tyhjennetään timeout
                
                if (data.status !== 'ok') {
                    throw new Error('Palvelin hylkäsi pyynnön.');
                }
                
                var items = data.items;
                var next7Days = new Date(now);
                next7Days.setDate(now.getDate() + 7);
                
                var processedEvents = [];
                
                for (var i = 0; i < items.length; i++) {
                    var descHtml = items[i].content || items[i].description;
                    var tempDiv = document.createElement('div');
                    tempDiv.innerHTML = descHtml;
                    var rows = tempDiv.getElementsByTagName('tr');
                    var evtData = {};
                    
                    for (var r = 0; r < rows.length; r++) {
                        var th = rows[r].getElementsByTagName('th')[0];
                        var td = rows[r].getElementsByTagName('td')[0];
                        if (th && td) {
                            var key = th.innerText.replace(':', '').trim().toLowerCase();
                            evtData[key] = td.innerText.trim();
                        }
                    }
                    
                    var eventStart = parseNordPoolDate(evtData['event start']);
                    var eventStop = parseNordPoolDate(evtData['event stop']);
                    
                    if (eventStart && eventStart <= next7Days && (!eventStop || eventStop > now)) {
                        var titleText = evtData['unit name'] || evtData['remarks'] || 'Yleinen UMM-ilmoitus';
                        if (titleText.length > 120) titleText = titleText.substring(0, 117) + '...';
                        
                        processedEvents.push({
                            title: titleText,
                            remarks: evtData['remarks'], 
                            start: eventStart,
                            end: eventStop
                        });
                    }
                }
                
                processedEvents.sort((a, b) => a.start - b.start);
                
                // Tallenna onnistunut haku välimuistiin
                cachedEvents = processedEvents; 
                isFirstLoad = false;
                
                // Päivitä aikaleima
                lastUpdatedEl.innerText = 'Päivitetty: klo ' + now.toLocaleTimeString('fi-FI');
                
                // Piirrä tapahtumat (Ei virhettä)
                renderEvents(cachedEvents, false);
            })
            .catch(e => {
                clearTimeout(timeoutId);
                
                // Jos haku kaatuu, näytä vanhat tiedot välimuistista varoituksella
                if (!isFirstLoad) {
                    renderEvents(cachedEvents, true);
                } else {
                    ummContent.innerHTML = '<div style="color:#ff6666;">Virhe yhteydessä Nord Pooliin: ' + e.message + '</div>';
                }
            });
    }

    fetchUMMRSS();
    setInterval(fetchUMMRSS, 300000); 

</script>

</body>
</html>
