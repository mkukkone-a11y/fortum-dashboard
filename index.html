<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard: UMM & Kello</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            box-sizing: border-box;
            overflow: hidden; 
        }
        
        .dashboard-wrapper {
            display: flex;
            flex-direction: row; 
            gap: 40px;
            width: 95vw;
            max-width: 1800px; 
            height: 85vh; 
        }

        .clock-container, .umm-container {
            flex: 1; 
            background: #1e1e1e;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 40px 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* --- UMM TYYLIT --- */
        .umm-header {
            font-size: 1.6rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            flex-shrink: 0; 
        }

        #umm-content {
            flex: 1;
            overflow-y: auto; 
            padding-right: 15px;
        }

        #umm-content::-webkit-scrollbar { width: 8px; }
        #umm-content::-webkit-scrollbar-track { background: #1e1e1e; }
        #umm-content::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .umm-card {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .umm-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
            color: #e0e0e0;
            word-wrap: break-word;
        }

        .umm-time {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .timer {
            font-weight: bold;
            font-size: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }

        .timer.upcoming { background: #0f2942; color: #66b3ff; }
        .timer.warning { background: #4a1515; color: #ff8080; }
        .timer.active { background: #113311; color: #80ff80; }
        .timer.active-warning { background: #4d2600; color: #ffb366; }
        .timer.finished { background: #333333; color: #888888; }

        /* --- KELLON TYYLIT --- */
        .clock-container {
            justify-content: center; 
            align-items: center;
            gap: 40px;
        }

        .week-display {
            font-size: 1.8rem;
            color: #4CAF50;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            width: 100%;
            text-align: center;
            margin-bottom: -10px;
        }
        
        .country-block {
            text-align: center;
            width: 100%;
        }
        
        .country-name {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        .flag-icon {
            height: 26px;
            border-radius: 3px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        
        .time-display {
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            margin-bottom: 5px;
            line-height: 1;
        }

        .date-display {
            color: #aaaaaa;
            text-transform: capitalize;
        }
        
        /* --- SUOMI --- */
        .finland .country-name { font-size: 1.5rem; }
        .finland .flag-icon { height: 32px; }
        .finland .time-display { 
            font-size: 9rem; 
            color: #00A6EF; 
            text-shadow: 0 0 30px rgba(0, 166, 239, 0.4); 
        }
        .finland .date-display { font-size: 1.6rem; }

        /* --- RUOTSI --- */
        .sweden { opacity: 0.85; }
        .sweden .country-name { font-size: 1.2rem; }
        .sweden .time-display { 
            font-size: 5rem; 
            color: #FFD700; 
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); 
        }
        .sweden .date-display { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    
    <div class="umm-container">
        <h2 class="umm-header">UMMIT AKTIIVISET/TULEVAT:</h2>
        <div id="umm-content">Ladataan tietoja Nord Poolista...</div>
    </div>

    <div class="clock-container">
        <div class="week-display" id="week-number">VIIKKO --</div>
        
        <div class="country-block finland">
            <div class="country-name">
                <svg class="flag-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 11">
                    <rect width="18" height="11" fill="#ffffff"/>
                    <rect width="5" height="11" x="5" fill="#002f6c"/>
                    <rect width="18" height="3" y="4" fill="#002f6c"/>
                </svg>
                SUOMI
            </div>
            <div class="time-display" id="time-fi">--:--:--</div>
            <div class="date-display" id="date-fi">--</div>
        </div>
        
        <div class="country-block sweden">
            <div class="country-name">
                <svg class="flag-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 10">
                    <rect width="16" height="10" fill="#005293"/>
                    <rect width="2" height="10" x="5" fill="#fecb00"/>
                    <rect width="16" height="2" y="4" fill="#fecb00"/>
                </svg>
                RUOTSI
            </div>
            <div class="time-display" id="time-se">--:--:--</div>
            <div class="date-display" id="date-se">--</div>
        </div>
    </div>

</div>

<script>
    /* --- KELLON LOGIIKKA --- */
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function capitalizeFirstLetter(string) {
        return string.charAt(0).toUpperCase() + string.slice(1);
    }

    function updateClocks() {
        const now = new Date();
        document.getElementById('week-number').textContent = 'VIIKKO ' + getWeekNumber(now);

        const tOpt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const dOpt = { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' };

        document.getElementById('time-fi').textContent = new Intl.DateTimeFormat('fi-FI', { ...tOpt, timeZone: 'Europe/Helsinki' }).format(now).replace(/\./g, ':');
        document.getElementById('date-fi').textContent = capitalizeFirstLetter(new Intl.DateTimeFormat('fi-FI', { ...dOpt, timeZone: 'Europe/Helsinki' }).format(now));
        
        document.getElementById('time-se').textContent = new Intl.DateTimeFormat('fi-FI', { ...tOpt, timeZone: 'Europe/Stockholm' }).format(now).replace(/\./g, ':');
        document.getElementById('date-se').textContent = capitalizeFirstLetter(new Intl.DateTimeFormat('fi-FI', { ...dOpt, timeZone: 'Europe/Stockholm' }).format(now));
    }
    updateClocks();
    setInterval(updateClocks, 1000);


    /* --- UMM LOGIIKKA --- */
    var ummContent = document.getElementById('umm-content');
    var countdownIntervals = [];

    function fetchUMMData() {
        countdownIntervals.forEach(clearInterval);
        countdownIntervals = [];

        const targetUrl = 'https://ummapi.nordpoolgroup.com/messages?limit=200';
        const proxyUrl = 'https://api.codetabs.com/v1/proxy?quest=' + targetUrl;

        fetch(proxyUrl)
            .then(r => r.json())
            .then(d => {
                var n = new Date();
                var n7 = new Date();
                n7.setDate(n.getDate() + 7);
                
                var evs = d.items.filter(i => {
                    var jsonStr = JSON.stringify(i).toLowerCase();
                    if (!jsonStr.includes('fortum power and heat oy')) return false;
                    
                    var s = new Date(i.eventStart || i.deliveryStart || i.publicationDate);
                    var e = i.eventStop ? new Date(i.eventStop) : (i.deliveryStop ? new Date(i.deliveryStop) : null);
                    return (s > n && s <= n7) || (s <= n && e && e > n);
                });
                
                if (!evs.length) {
                    var currentTime = new Date().toLocaleTimeString('fi-FI', { hour: '2-digit', minute: '2-digit' });
                    ummContent.innerHTML = '<div style="text-align:center; color:#888; font-size:1.2rem; padding: 20px;">Ei tulevia tai aktiivisia tapahtumia Fortumille seuraavaan 7 päivään.<br><span style="font-size:0.9rem; color:#555;">(Päivitetty klo ' + currentTime + ')</span></div>';
                    return;
                }
                
                evs.sort((a, b) => {
                    var sa = new Date(a.eventStart || a.deliveryStart || a.publicationDate);
                    var ea = a.eventStop ? new Date(a.eventStop) : (a.deliveryStop ? new Date(a.deliveryStop) : null);
                    var sb = new Date(b.eventStart || b.deliveryStart || b.publicationDate);
                    var eb = b.eventStop ? new Date(b.eventStop) : (b.deliveryStop ? new Date(b.deliveryStop) : null);
                    return (sa > n ? sa : (ea || sa)) - (sb > n ? sb : (eb || sb));
                });
                
                ummContent.innerHTML = '';
                
                evs.forEach((ev) => {
                    var card = document.createElement('div');
                    card.className = 'umm-card';
                    
                    var title = document.createElement('div');
                    title.className = 'umm-title';
                    
                    var nme = '';

                    // 1. Etsitään oikea yksikön tai laitoksen nimi
                    var arrs = [ev.productionUnits, ev.stations, ev.assets, ev.consumptionUnits];
                    for (var j = 0; j < arrs.length; j++) {
                        if (arrs[j] && arrs[j][0] && arrs[j][0].name) {
                            nme = arrs[j][0].name; break;
                        }
                    }

                    // 2. Jos laitosta ei löydy, etsitään vapaata selitettä tai syytä
                    if (!nme || nme.toLowerCase().includes('fortum power and heat')) {
                        if (ev.remarks && ev.remarks.length > 2) {
                            nme = ev.remarks;
                        } else if (ev.unavailabilityReason && ev.unavailabilityReason.length > 2) {
                            nme = "Syy: " + ev.unavailabilityReason;
                        } else if (ev.subject && ev.subject.length > 2) {
                            nme = ev.subject;
                        }
                    }

                    // 3. Estetään lopullisesti OMIMSG-koodien tulostuminen
                    if (!nme || nme.startsWith('OMIMSG') || nme.match(/^[0-9a-fA-F-]{10,}$/)) {
                        nme = 'Yleinen Fortum UMM -ilmoitus';
                    }

                    // 4. Katkaistaan liian pitkät tekstit siististi
                    if (nme.length > 60) {
                        nme = nme.substring(0, 60) + '...';
                    }
                    
                    title.innerText = nme;
                    
                    var s = new Date(ev.eventStart || ev.deliveryStart || ev.publicationDate);
                    var e = ev.eventStop ? new Date(ev.eventStop) : (ev.deliveryStop ? new Date(ev.deliveryStop) : null);
                    
                    var p = document.createElement('div');
                    p.className = 'umm-time';
                    p.innerHTML = 'Alkaa: ' + s.toLocaleString('fi-FI') + (e ? '<br>Päättyy: ' + e.toLocaleString('fi-FI') : '');
                    
                    var tmr = document.createElement('div');
                    tmr.className = 'timer';
                    
                    card.appendChild(title);
                    card.appendChild(p);
                    card.appendChild(tmr);
                    ummContent.appendChild(card);
                    
                    var intervalId = setInterval(() => {
                        var nw = new Date();
                        var ds = s - nw;
                        var de = e ? e - nw : -1;
                        
                        var ft = ms => {
                            if (ms < 0) return '00:00:00';
                            var ts = Math.floor(ms / 1000), da = Math.floor(ts / 86400), h = Math.floor((ts % 86400) / 3600), m = Math.floor((ts % 3600) / 60), se = ts % 60;
                            return (da > 0 ? da + 'p ' + h + 'h ' : h + 'h ') + m + 'm ' + se + 's';
                        };
                        
                        var h2 = 7200000; 
                        
                        if (ds > 0) {
                            if (ds <= h2) { tmr.innerText = '⚠️ Alkaa: ' + ft(ds); tmr.className = 'timer warning'; }
                            else { tmr.innerText = 'Alkaa: ' + ft(ds); tmr.className = 'timer upcoming'; }
                        } else if (ds <= 0 && de > 0) {
                            if (de <= h2) { tmr.innerText = '⚠️ AKTIIVINEN. Päättyy: ' + ft(de); tmr.className = 'timer active-warning'; }
                            else { tmr.innerText = 'AKTIIVINEN. Päättyy: ' + ft(de); tmr.className = 'timer active'; }
                        } else {
                            tmr.innerText = 'Tapahtuma päättynyt'; tmr.className = 'timer finished';
                        }
                    }, 1000);

                    countdownIntervals.push(intervalId);
                });
            })
            .catch(e => {
                ummContent.innerHTML = '<div style="color:#ff6666;">Virhe haettaessa tietoja: ' + e.message + '</div>';
            });
    }

    fetchUMMData();
    setInterval(fetchUMMData, 3600000);

</script>

</body>
</html>
